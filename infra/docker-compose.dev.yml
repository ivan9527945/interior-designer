# Dev-time services. 啟動：
#   docker compose -f infra/docker-compose.dev.yml up -d
# 無 Docker 備援見根 README.md。

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: renderstudio
      POSTGRES_PASSWORD: renderstudio
      POSTGRES_DB: renderstudio
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U renderstudio"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes: [miniodata:/data]

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports: ["8080:8080"]

volumes:
  pgdata:
  miniodata:
