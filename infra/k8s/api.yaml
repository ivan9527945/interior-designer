apiVersion: apps/v1
kind: Deployment
metadata:
  name: renderstudio-api
  labels:
    app: renderstudio-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: renderstudio-api
  template:
    metadata:
      labels:
        app: renderstudio-api
    spec:
      containers:
        - name: api
          image: ghcr.io/company/renderstudio-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: renderstudio-backend-env
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: renderstudio-api
spec:
  selector:
    app: renderstudio-api
  ports:
    - port: 80
      targetPort: 8000
