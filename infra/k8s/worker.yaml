apiVersion: apps/v1
kind: Deployment
metadata:
  name: renderstudio-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: renderstudio-worker
  template:
    metadata:
      labels:
        app: renderstudio-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/company/renderstudio-api:latest
          command: ["celery", "-A", "app.tasks.celery_app", "worker", "--loglevel=info"]
          envFrom:
            - secretRef:
                name: renderstudio-backend-env
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
